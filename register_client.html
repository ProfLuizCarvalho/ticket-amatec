<!-- register_client.html (FRAGMENTO HTML) - Versão Detalhada -->

<div class="main-content">
    <div class="form-section">
        <form id="clientRegistrationForm" class="form-container">
            <div class="form-header">
                <h2>Formulário de Cadastro de Cliente</h2>
            </div>

            <!-- Tipo de Cliente -->
            <div class="form-grid-full-width">
                <div class="form-group">
                    <label for="clientType">Tipo de Cliente:</label>
                    <select id="clientType" name="clientType" required>
                        <option value="">Selecione o Tipo</option>
                        <option value="PF">Pessoa Física</option>
                        <option value="PJ">Pessoa Jurídica</option>
                    </select>
                </div>
            </div>

            <!-- Seção: Dados Pessoais / Comerciais -->
            <div class="form-subsection-header">
                <h3>Dados Pessoais / Comerciais</h3>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="clientId">ID do Cliente:</label>
                    <input type="text" id="clientId" name="clientId" required>
                </div>
                <div class="form-group">
                    <label for="clientName">Nome Completo / Razão Social:</label>
                    <input type="text" id="clientName" name="clientName" required>
                </div>
                <div class="form-group" id="contactPersonGroup">
                    <label for="contactPerson">Pessoa de Contato (PJ):</label>
                    <input type="text" id="contactPerson" name="contactPerson">
                </div>

                <!-- Campos Pessoa Física -->
                <div class="form-group pf-field">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="XXX.XXX.XXX-XX">
                </div>
                <div class="form-group pf-field">
                    <label for="birthDate">Data de Nascimento:</label>
                    <input type="date" id="birthDate" name="birthDate">
                </div>
                <div class="form-group pf-field">
                    <label for="gender">Sexo:</label>
                    <select id="gender" name="gender">
                        <option value="">Selecione</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <!-- Campos Pessoa Jurídica -->
                <div class="form-group pj-field">
                    <label for="cnpj">CNPJ:</label>
                    <input type="text" id="cnpj" name="cnpj" placeholder="XX.XXX.XXX/XXXX-XX">
                </div>
                <div class="form-group pj-field">
                    <label for="tradeName">Nome Fantasia:</label>
                    <input type="text" id="tradeName" name="tradeName">
                </div>
                <div class="form-group pj-field">
                    <label for="stateRegistration">Inscrição Estadual/Municipal:</label>
                    <input type="text" id="stateRegistration" name="stateRegistration">
                </div>
            </div>

            <!-- Seção: Contato -->
            <div class="form-subsection-header">
                <h3>Contato</h3>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="mainPhone">Telefone Principal:</label>
                    <input type="text" id="mainPhone" name="mainPhone" placeholder="(XX) XXXXX-XXXX" required>
                </div>
                <div class="form-group">
                    <label for="secondaryPhone">Telefone Secundário:</label>
                    <input type="text" id="secondaryPhone" name="secondaryPhone" placeholder="(XX) XXXXX-XXXX">
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <!-- Seção: Endereço -->
            <div class="form-subsection-header">
                <h3>Endereço</h3>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="street">Rua:</label>
                    <input type="text" id="street" name="street">
                </div>
                <div class="form-group">
                    <label for="number">Número:</label>
                    <input type="text" id="number" name="number">
                </div>
                <div class="form-group">
                    <label for="neighborhood">Bairro:</label>
                    <input type="text" id="neighborhood" name="neighborhood">
                </div>
                <div class="form-group">
                    <label for="city">Cidade:</label>
                    <input type="text" id="city" name="city">
                </div>
                <div class="form-group">
                    <label for="state">Estado:</label>
                    <input type="text" id="state" name="state">
                </div>
                <div class="form-group">
                    <label for="zipCode">CEP:</label>
                    <input type="text" id="zipCode" name="zipCode" placeholder="XXXXX-XXX">
                </div>
            </div>

            <!-- Seção: Informações Financeiras -->
            <div class="form-subsection-header">
                <h3>Informações Financeiras</h3>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="paymentMethod">Forma de Pagamento Preferida:</label>
                    <select id="paymentMethod" name="paymentMethod">
                        <option value="">Selecione</option>
                        <option value="Boleto">Boleto</option>
                        <option value="Cartao">Cartão</option>
                        <option value="PIX">PIX</option>
                        <option value="Transferencia">Transferência</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="creditLimit">Limite de Crédito (R$):</label>
                    <input type="number" id="creditLimit" name="creditLimit" step="0.01" min="0">
                </div>
            </div>

            <!-- Seção: Informações Adicionais -->
            <div class="form-subsection-header">
                <h3>Informações Adicionais</h3>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="registrationDate">Data de Cadastro:</label>
                    <input type="date" id="registrationDate" name="registrationDate">
                </div>
                <div class="form-group">
                    <label for="status">Status do Cliente:</label>
                    <select id="status" name="status" required>
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                        <option value="potencial">Potencial</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="origin">Origem do Cliente:</label>
                    <input type="text" id="origin" name="origin" placeholder="Ex: Indicação, Campanha, Site">
                </div>
                <div class="form-group form-group-full-width">
                    <label for="notes">Observações/Notas Internas:</label>
                    <textarea id="notes" name="notes" rows="3"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <!-- ORDEM ALTERADA AQUI -->
                <button type="button" id="editButton" class="btn btn-primary">Editar</button>
                <button type="button" id="deleteButton" class="btn btn-danger">Excluir</button>
                <button type="button" id="cancelButton" class="btn btn-secondary">Cancelar</button>
                <button type="submit" id="saveButton" class="btn btn-success">Salvar</button>
            </div>
            <p id="formMessage" class="error-message"></p>
        </form>
    </div>

    <div class="grid-section">
        <h2>Clientes Cadastrados</h2>
        <table id="clientGrid" class="data-grid">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome / Razão Social</th>
                    <th>Tipo</th>
                    <th>Email</th>
                    <th>Telefone Principal</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Linhas de clientes serão injetadas aqui pelo JS -->
            </tbody>
        </table>
    </div>
</div>
