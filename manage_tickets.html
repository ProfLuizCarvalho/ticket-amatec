<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Tickets</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/forms.css">
    <!-- Pode ser que você queira um CSS específico para a grid aqui, ou usar o forms.css -->
</head>
<body>
    <div class="main-content">
        <div class="grid-section">
            <h2>Tickets Abertos</h2>
            <table id="ticketGrid" class="data-grid">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Abertura</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th>Problema</th>
                        <th>Técnico</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="ticketGridBody">
                    <!-- Linhas de tickets serão injetadas aqui pelo JS -->
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
