<!-- register_technician.html (FRAGMENTO HTML) -->

<div class="main-content">
    <div class="form-section">
        <form id="technicianRegistrationForm" class="form-container">
            <div class="form-header">
                <h2>Formulário de Cadastro de Técnico</h2>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="technicianId">ID do Técnico:</label>
                    <input type="text" id="technicianId" name="technicianId" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Nome Completo:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="specialty">Especialidade:</label>
                    <input type="text" id="specialty" name="specialty" placeholder="Ex: Redes, Hardware, Software">
                </div>
                <div class="form-group">
                    <label for="phone">Telefone:</label>
                    <input type="text" id="phone" name="phone" placeholder="(XX) XXXXX-XXXX">
                </div>
                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" name="status" required>
                        <option value="active">Ativo</option>
                        <option value="inactive">Inativo</option>
                        <option value="on_leave">De Licença</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <!-- ORDEM ALTERADA AQUI -->
                <button type="button" id="editButton" class="btn btn-primary">Editar</button>
                <button type="button" id="deleteButton" class="btn btn-danger">Excluir</button>
                <button type="button" id="cancelButton" class="btn btn-secondary">Cancelar</button>
                <button type="submit" id="saveButton" class="btn btn-success">Salvar</button>
            </div>
            <p id="formMessage" class="error-message"></p>
        </form>
    </div>

    <div class="grid-section">
        <h2>Técnicos Cadastrados</h2>
        <table id="technicianGrid" class="data-grid">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome Completo</th>
                    <th>Email</th>
                    <th>Especialidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Linhas de técnicos serão injetadas aqui pelo JS -->
            </tbody>
        </table>
    </div>
</div>
